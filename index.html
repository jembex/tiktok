<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Followers – Grow Your Audience</title>
    <meta name="description" content="Boost your social media presence with Top Followers. Get more real followers instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --accent: #ec4899;
            --accent2: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f1f5f9;
            --text-muted: rgba(241, 245, 249, 0.55);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.12);
            --input-focus: rgba(168, 85, 247, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0716;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #ec4899, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #f97316, transparent 70%);
            top: 40%;
            left: 60%;
            animation-delay: -7s;
            opacity: 0.25;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -40px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.97); }
        }

        /* Subtle grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 40px 40px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 32px 64px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(168, 85, 247, 0.12);
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo / badge */
        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .badge-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-dark), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.4);
        }

        .badge-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        /* Headings */
        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.2;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f1f5f9 30%, rgba(168,85,247,0.85));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 36px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* Stats strip */
        .stats {
            display: flex;
            gap: 1px;
            background: var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .stat {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            background: rgba(255,255,255,0.04);
            transition: background 0.2s;
        }

        .stat:hover { background: rgba(255,255,255,0.07); }

        .stat-num {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        .form-group input::placeholder {
            color: rgba(241, 245, 249, 0.25);
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.08);
            box-shadow: 0 0 0 3px var(--input-focus);
        }

        .form-group input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }

        /* Eye toggle */
        .eye-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s;
            user-select: none;
            line-height: 1;
        }

        .eye-toggle:hover { color: var(--text-primary); }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
            background-size: 200% 200%;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.4px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, background-position 0.4s;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(168, 85, 247, 0.55);
            background-position: right center;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Spinner inside button */
        .btn-submit .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Message */
        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .message.warning {
            background: rgba(234, 179, 8, 0.12);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #facc15;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Footer note */
        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
            line-height: 1.6;
        }

        .footer-note span {
            color: var(--primary);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; }
            h1 { font-size: 1.55rem; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>

    <!-- Main Card -->
    <div class="card">
        <!-- Logo -->
        <div class="badge">
            <div class="badge-icon">🚀</div>
            <span class="badge-text">TopFollowers</span>
        </div>

        <h1>Grow Your Audience</h1>
        <p class="subtitle">Sign in to unlock real followers &amp; boost your social reach instantly.</p>

        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-num">2.4M+</div>
                <div class="stat-label">Users</div>
            </div>
            <div class="stat">
                <div class="stat-num">98%</div>
                <div class="stat-label">Real</div>
            </div>
            <div class="stat">
                <div class="stat-num">Fast</div>
                <div class="stat-label">Delivery</div>
            </div>
        </div>

        <!-- Form -->
        <form id="registrationForm" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    <span class="input-icon">✉️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <span class="input-icon">🔒</span>
                    <span class="eye-toggle" id="togglePassword" title="Show/hide password">👁</span>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Get Started Free</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div id="registrationMessage" class="message"></div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">SECURE &amp; PRIVATE</span>
            <div class="divider-line"></div>
        </div>

        <p class="footer-note">
            By continuing you agree to our <span>Terms of Service</span> &amp; <span>Privacy Policy</span>.<br>
            Your data is encrypted and never shared.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const registrationMessage = document.getElementById('registrationMessage');
            const togglePassword = document.getElementById('togglePassword');
            const submitBtn = document.getElementById('submitBtn');

            function hideMessage() {
                registrationMessage.style.display = 'none';
                registrationMessage.textContent = '';
                registrationMessage.className = 'message';
            }

            function showMessage(text, type = 'error') {
                registrationMessage.textContent = text;
                registrationMessage.className = 'message ' + type;
                registrationMessage.style.display = 'block';
            }

            emailInput.addEventListener('keyup', hideMessage);
            passwordInput.addEventListener('keyup', hideMessage);

            document.getElementById('registrationForm').addEventListener('submit', async function (event) {
                event.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showMessage('Please fill in all fields.', 'warning');
                    return;
                }

                // Loading state
                submitBtn.classList.add('loading');
                hideMessage();

                try {
                    const response = await fetch('/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    // Safely parse JSON — server may return HTML on 502/503 errors
                    let data = {};
                    try {
                        data = await response.json();
                    } catch (jsonErr) {
                        data = { message: 'Server is starting up. Please try again in a moment.' };
                    }

                    if (response.ok) {
                        showMessage(data.message || 'Operation successful!', 'success');
                        emailInput.value = '';
                        passwordInput.value = '';
                    } else {
                        showMessage(data.message || 'An error occurred. Please try again.', 'error');
                    }

                } catch (error) {
                    console.error('Error during registration:', error);
                    showMessage('Network error or server unavailable. Please try again.', 'error');
                } finally {
                    submitBtn.classList.remove('loading');
                }
            });

            // Password visibility toggle
            togglePassword.addEventListener('click', function () {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                this.textContent = isPassword ? '🙈' : '👁';
            });
        });
    </script>
</body>
</html>
